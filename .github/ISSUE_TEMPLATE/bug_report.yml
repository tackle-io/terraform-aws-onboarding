name: Bug Report
description: Report a problem with the module
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections
        below so we can reproduce and fix the issue.

  - type: input
    id: terraform_version
    attributes:
      label: Terraform version
      description: Output of `terraform version`
      placeholder: "Terraform v1.14.6"
    validations:
      required: true

  - type: input
    id: module_version
    attributes:
      label: Module version / git ref
      description: The `?ref=` value you are using, or the commit SHA
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: aws_provider_version
    attributes:
      label: AWS provider version
      description: Output of `terraform providers`
      placeholder: "hashicorp/aws v6.x.x"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimal Terraform configuration and commands that reproduce the issue.
        **Do not include real credentials, account IDs, or sensitive values.**
      render: hcl
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Full error message or relevant log output.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am not including real credentials or sensitive data in this report.
          required: true
